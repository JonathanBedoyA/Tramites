<!DOCTYPE html>
<html lang="es">
<head>
     <!-- Configuracion basica del documento -->
     <meta charset="UTF-8">
     <title>Sistema Escolar Secundaria</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
     <!-- Pantalla de acceso -->
     <div class="login" id="login">
          <!-- Formulario de inicio de sesion -->
          <h2>Sistema Escolar</h2>
          <select id="rol">
               <option value="alumno">Alumno</option>
               <option value="administrador">Administrador</option>
               <option value="director">Director</option>
               <option value="prefectura">Prefectura</option>
               <option value="docente">Docente</option>
          </select>
          <input type="text" id="usuario" placeholder="Matricula o usuario">
          <input type="password" id="password" placeholder="Contrasena">
          <button onclick="login()">Entrar</button>
          <p class="ayuda-login">Demo: Alumno A001/1234 | Admin admin/admin123 | Director director1/dir123 | Prefectura pref1/pref123 | Docente docente1/doc123</p>
     </div>

     <!-- Panel principal que se muestra despues del login -->
     <div class="dashboard" id="dashboard">
          <!-- Barra lateral de navegacion -->
          <div class="sidebar">
               <h2>Escuela</h2>
               <p id="panelUsuario" class="panel-usuario">Sin sesion</p>

               <!-- Buscador global de alumnos -->
               <div id="buscadorGlobalWrap" class="buscador-global-wrap">
                    <input id="buscadorGlobal" type="text" placeholder="Buscar alumno: matricula o nombre" oninput="buscarGlobalAlumno()">
                    <div id="buscadorGlobalResultados" class="buscador-global-resultados"></div>
               </div>

               <!-- Navegacion principal por modulos -->
               <button onclick="mostrar('inicio')">Inicio</button>
               <button id="menuInfo" onclick="mostrar('info')">Expediente</button>
               <button id="menuCalificaciones" onclick="mostrar('calificaciones')">Calificaciones</button>
               <button id="menuDisciplina" onclick="mostrar('disciplina')">Disciplina</button>
               <button id="menuCartas" onclick="mostrar('cartas')">Cartas compromiso</button>
               <button id="menuEstadisticas" onclick="mostrar('estadisticas')">Estadísticas</button>
               <button id="menuGestion" onclick="mostrar('gestion')">Administración</button>
               <button onclick="mostrar('notificaciones')">Notificaciones</button>
               <button onclick="cerrarSesion()">Cerrar sesión</button>
          </div>

          <!-- Area donde se renderiza cada modulo -->
          <div class="contenido" id="contenido">
               <h2>Bienvenido al sistema escolar</h2>
               <p>Selecciona una opción del menú.</p>
          </div>
     </div>

     <!-- Logica de la aplicacion -->
     <script src="script.js"></script>
</body>
</html>
